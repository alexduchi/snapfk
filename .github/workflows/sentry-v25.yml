name: Build Sentry v25 APK

on:
  push:
    branches:
      - sentry-v25.0-20260718
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentry
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Make Gradle executable
        run: chmod +x gradlew
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Sentry-v25.0.0.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sentry-v25.0.0-debug
          path: sentry/app/build/outputs/apk/debug/Sentry-v25.0.0.apk
          if-no-files-found: error
