name: Build SpeedSMP 1.0.5 PvP
on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build against official Paper API
        id: build
        continue-on-error: true
        working-directory: speedsmp
        run: |
          rm -rf ~/.m2/repository/it/unimi/dsi/fastutil
          mvn -B -U clean package > build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpeedSMP-1.0.5-build-log
          path: speedsmp/build.log
      - name: Upload jar
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: SpeedSMP-1.0.5-PvPKill
          path: speedsmp/target/SpeedSMP-1.0.5-PvPKill.jar
          if-no-files-found: error
      - name: Fail build
        if: steps.build.outcome != 'success'
        run: exit 1
