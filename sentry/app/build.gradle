plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sentry.local'
    compileSdk 36

    defaultConfig {
        applicationId 'com.sentry.local'
        minSdk 26
        targetSdk 36
        versionCode 5
        versionName '3.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
