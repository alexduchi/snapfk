name: Build HoloForge AR v0.3

on:
  push:
    branches:
      - agent/holoforge-v03
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract source
        run: |
          mkdir -p holoforge_v03
          cat .holoforge/v03.part* | base64 -d > /tmp/holoforge-v03.tar.gz
          echo "6716fef4ac2842c60d28de1b255fb3d00461c24acfee2d4ee942a29a177a8004  /tmp/holoforge-v03.tar.gz" | sha256sum -c -
          tar -xzf /tmp/holoforge-v03.tar.gz -C holoforge_v03

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build signed debug APK
        run: cd holoforge_v03 && gradle :app:assembleDebug --stacktrace

      - name: Verify APK
        run: |
          APK=holoforge_v03/app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | head -20
          cp "$APK" HoloForgeAR-v0.3-diagnostic.apk
          sha256sum HoloForgeAR-v0.3-diagnostic.apk > HoloForgeAR-v0.3-diagnostic.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HoloForgeAR-v0.3-diagnostic
          path: |
            HoloForgeAR-v0.3-diagnostic.apk
            HoloForgeAR-v0.3-diagnostic.sha256
          if-no-files-found: error
          retention-days: 14
