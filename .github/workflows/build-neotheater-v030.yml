name: Build NeoTheater Worldgen 0.3.0

on:
  push:
    branches: ["neotheater-ci-v030"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Extract V0.2 base and apply V0.3 overlay
        run: |
          mkdir -p neotheater-v030
          base64 -d neotheater-build/project.tar.gz.b64 > /tmp/project.tar.gz
          tar -xzf /tmp/project.tar.gz -C neotheater-v030
          cat neotheater-v030/overlay.part00 neotheater-v030/overlay.part01 neotheater-v030/overlay.part02 neotheater-v030/overlay.part03 | base64 -d > /tmp/v03overlay.tar.gz
          tar -xzf /tmp/v03overlay.tar.gz -C neotheater-v030
          rm -f neotheater-v030/overlay.part00 neotheater-v030/overlay.part01 neotheater-v030/overlay.part02 neotheater-v030/overlay.part03

      - name: Build mod
        working-directory: neotheater-v030
        run: gradle --stacktrace build

      - name: Prepare dedicated-server smoke test
        working-directory: neotheater-v030
        run: |
          mkdir -p run
          printf 'eula=true\n' > run/eula.txt
          cat > run/server.properties <<'EOF'
          level-name=world_neotheater_v030_smoke
          level-type=neotheater:military
          online-mode=false
          spawn-protection=0
          view-distance=4
          simulation-distance=4
          max-tick-time=180000
          generate-structures=true
          motd=NeoTheater 0.3 smoke test
          EOF

      - name: Run dedicated-server smoke test
        working-directory: neotheater-v030
        run: |
          set +e
          timeout 240s gradle --stacktrace runServer > smoke-test.log 2>&1
          code=$?
          set -e
          test -f run/logs/latest.log
          grep -F "Done (" run/logs/latest.log
          grep -F "Neo Theater active:" run/logs/latest.log
          grep -F "Neo Theater Worldgen 0.3.0" run/logs/latest.log
          if grep -E "Failed to load datapacks|Registry loading errors|Exception in server tick loop|Failed to start the minecraft server|Caused by:" run/logs/latest.log; then
            echo "Fatal server/worldgen error found"
            tail -n 300 run/logs/latest.log
            exit 1
          fi
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            echo "runServer exited unexpectedly with code $code"
            tail -n 300 smoke-test.log
            exit "$code"
          fi

      - name: Package sources and hashes
        working-directory: neotheater-v030
        run: |
          zip -qr NeoTheaterWorldgen-0.3.0-sources.zip settings.gradle gradle.properties build.gradle README.md src
          sha256sum build/libs/*.jar > NeoTheaterWorldgen-0.3.0-SHA256.txt

      - name: Upload tested artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoTheaterWorldgen-0.3.0
          if-no-files-found: error
          path: |
            neotheater-v030/build/libs/*.jar
            neotheater-v030/NeoTheaterWorldgen-0.3.0-sources.zip
            neotheater-v030/NeoTheaterWorldgen-0.3.0-SHA256.txt
            neotheater-v030/smoke-test.log
            neotheater-v030/run/logs/latest.log
