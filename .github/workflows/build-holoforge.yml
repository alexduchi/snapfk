name: Build HoloForge AR APK

on:
  push:
    branches:
      - agent/holoforge-ar-build
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Prepare HoloForge v0.6
        run: |
          set -o pipefail
          python3 holoforge_v06/run_clean_fixed.py 2>&1 | tee holoforge-v06-prepare.log

      - name: Compile HoloForge AR v0.6
        run: |
          set -o pipefail
          cd holoforge_v06_build
          gradle clean :app:assembleDebug --stacktrace 2>&1 | tee ../holoforge-v06-gradle.log

      - name: Verify APK structure and signature
        run: |
          APK=holoforge_v06_build/app/build/outputs/apk/debug/app-debug.apk
          test -s "$APK"
          $ANDROID_HOME/build-tools/36.0.0/aapt dump badging "$APK"
          $ANDROID_HOME/build-tools/36.0.0/apksigner verify --verbose --print-certs "$APK"
          cp "$APK" HoloForgeAR-v0.6-visible-manual-modes.apk
          sha256sum HoloForgeAR-v0.6-visible-manual-modes.apk > HoloForgeAR-v0.6-visible-manual-modes.apk.sha256

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HoloForgeAR-v0.6-build-logs
          path: |
            holoforge-v06-prepare.log
            holoforge-v06-gradle.log
          if-no-files-found: warn
          retention-days: 3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HoloForgeAR-v0.6-Visible-Manual-Modes-APK
          path: |
            HoloForgeAR-v0.6-visible-manual-modes.apk
            HoloForgeAR-v0.6-visible-manual-modes.apk.sha256
          if-no-files-found: error
          retention-days: 14
