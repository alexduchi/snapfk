name: Build NeoTheater Worldgen 0.2.0

on:
  push:
    branches: ["neotheater-ci-v020"]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Extract project
        run: |
          mkdir -p neotheater-v020
          base64 -d neotheater-build/project.tar.gz.b64 > /tmp/project.tar.gz
          tar -xzf /tmp/project.tar.gz -C neotheater-v020

      - name: Build mod
        working-directory: neotheater-v020
        run: gradle --stacktrace build

      - name: Prepare dedicated-server smoke test
        working-directory: neotheater-v020
        run: |
          mkdir -p run
          printf 'eula=true\n' > run/eula.txt
          cat > run/server.properties <<'EOF'
          level-name=world_neotheater_smoke
          level-type=neotheater:military
          online-mode=false
          spawn-protection=0
          view-distance=4
          simulation-distance=4
          max-tick-time=120000
          generate-structures=true
          motd=NeoTheater smoke test
          EOF

      - name: Run dedicated-server smoke test
        working-directory: neotheater-v020
        run: |
          set +e
          timeout 180s gradle --stacktrace runServer > smoke-test.log 2>&1
          code=$?
          set -e
          test -f run/logs/latest.log
          grep -F "Done (" run/logs/latest.log
          grep -F "Neo Theater active:" run/logs/latest.log
          if grep -E "Failed to load datapacks|Registry loading errors|Exception in server tick loop|Failed to start the minecraft server" run/logs/latest.log; then
            echo "Fatal server/worldgen error found"
            exit 1
          fi
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            echo "runServer exited unexpectedly with code $code"
            tail -n 250 smoke-test.log
            exit "$code"
          fi

      - name: Package sources
        working-directory: neotheater-v020
        run: |
          zip -qr NeoTheaterWorldgen-0.2.0-sources.zip settings.gradle gradle.properties build.gradle README.md src
          sha256sum build/libs/*.jar > SHA256SUMS.txt

      - name: Upload tested artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoTheaterWorldgen-0.2.0
          if-no-files-found: error
          path: |
            neotheater-v020/build/libs/*.jar
            neotheater-v020/NeoTheaterWorldgen-0.2.0-sources.zip
            neotheater-v020/SHA256SUMS.txt
            neotheater-v020/smoke-test.log
            neotheater-v020/run/logs/latest.log
