name: Build HoloForge AR APK

on:
  push:
    branches:
      - agent/holoforge-ar-build
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Prepare official ARCore sample
        run: |
          rm -rf holoforge_v04_build arcore-android-sdk
          git clone --depth 1 https://github.com/google-ar/arcore-android-sdk.git arcore-android-sdk
          cp -R arcore-android-sdk/samples/hello_ar_java holoforge_v04_build
          sed -i 's/com.google.ar.core.examples.java.helloar/com.neo.holoforge.ar/g' holoforge_v04_build/app/build.gradle
          sed -i 's/HelloAR Java/HoloForge AR/g' holoforge_v04_build/app/src/main/res/values/strings.xml
          sed -i "s/versionCode 1/versionCode 4/" holoforge_v04_build/app/build.gradle
          sed -i "s/versionName '1.0'/versionName '0.4.0'/" holoforge_v04_build/app/build.gradle

      - name: Compile HoloForge AR v0.4
        run: |
          cd holoforge_v04_build
          gradle clean :app:assembleDebug --stacktrace

      - name: Verify APK structure and signature
        run: |
          APK=holoforge_v04_build/app/build/outputs/apk/debug/app-debug.apk
          test -s "$APK"
          $ANDROID_HOME/build-tools/36.0.0/aapt dump badging "$APK"
          $ANDROID_HOME/build-tools/36.0.0/apksigner verify --verbose --print-certs "$APK"
          cp "$APK" HoloForgeAR-v0.4-official-arcore.apk
          sha256sum HoloForgeAR-v0.4-official-arcore.apk > HoloForgeAR-v0.4-official-arcore.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HoloForgeAR-v0.4-official-ARCore-APK
          path: |
            HoloForgeAR-v0.4-official-arcore.apk
            HoloForgeAR-v0.4-official-arcore.apk.sha256
          if-no-files-found: error
          retention-days: 14
