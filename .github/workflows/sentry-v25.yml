name: Build Sentry v25 APK

on:
  push:
    branches:
      - sentry-v25.0-20260718
  pull_request:
    branches:
      - sentry-v24.0-20260718
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentry
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Build debug APK
        id: build
        shell: bash
        run: |
          set +e
          gradle assembleDebug --stacktrace > build-v25.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Sentry-v25-build-log
          path: sentry/build-v25.log
      - name: Rename APK
        if: steps.build.outputs.exit_code == '0'
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Sentry-v25.0.0.apk
      - name: Upload APK
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: Sentry-v25.0.0-debug
          path: sentry/app/build/outputs/apk/debug/Sentry-v25.0.0.apk
          if-no-files-found: error
      - name: Fail when build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
