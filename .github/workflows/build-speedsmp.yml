name: Build SpeedSMP 1.0.3
on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: speedsmp/pom.xml
      - name: Build against official Paper API
        id: build
        continue-on-error: true
        working-directory: speedsmp
        run: mvn -B -U clean package > build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpeedSMP-build-log
          path: speedsmp/build.log
      - name: Upload jar
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: SpeedSMP-1.0.3
          path: speedsmp/target/SpeedSMP-1.0.3.jar
          if-no-files-found: error
      - name: Fail when compilation failed
        if: steps.build.outcome != 'success'
        run: exit 1
