name: Build NeoTheater Worldgen 0.4.0

on:
  push:
    branches: ["neotheater-ci-v040"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Extract V0.3 base and apply V0.4 patch
        run: |
          mkdir -p neotheater-v040
          base64 -d neotheater-build/project.tar.gz.b64 > /tmp/project.tar.gz
          tar -xzf /tmp/project.tar.gz -C neotheater-v040
          cat neotheater-v030/overlay.part00 neotheater-v030/overlay.part01 neotheater-v030/overlay.part02 neotheater-v030/overlay.part03 | base64 -d > /tmp/v03overlay.tar.gz
          tar -xzf /tmp/v03overlay.tar.gz -C neotheater-v040
          cat neotheater-v040/v04p_00 neotheater-v040/v04p_01 neotheater-v040/v04p_02 | base64 -d | gzip -d > /tmp/v04.patch
          cd neotheater-v040
          patch --batch -p4 < /tmp/v04.patch || true
          sed -i 's/import net.minecraft.world.level.Heightmap;/import net.minecraft.world.level.levelgen.Heightmap;/' src/main/java/fr/neo/neotheater/world/CapitalGenerator.java
          rm -f v04p_00 v04p_01 v04p_02

      - name: Build mod
        working-directory: neotheater-v040
        run: gradle --stacktrace build > build.log 2>&1

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: NeoTheaterWorldgen-0.4.0-build-diagnostics
          path: |
            neotheater-v040/build.log
            neotheater-v040/src
          if-no-files-found: error

      - name: Prepare dedicated-server smoke test
        working-directory: neotheater-v040
        run: |
          mkdir -p run
          printf 'eula=true\n' > run/eula.txt
          cat > run/server.properties <<'EOF'
          level-name=world_neotheater_v040_smoke
          level-type=neotheater:military
          online-mode=false
          spawn-protection=0
          view-distance=4
          simulation-distance=4
          max-tick-time=180000
          generate-structures=true
          motd=NeoTheater 0.4 smoke test
          EOF

      - name: Run dedicated-server smoke test
        working-directory: neotheater-v040
        run: |
          set +e
          timeout 270s gradle --stacktrace runServer > smoke-test.log 2>&1
          code=$?
          set -e
          test -f run/logs/latest.log
          grep -F "Done (" run/logs/latest.log
          grep -F "Neo Theater active:" run/logs/latest.log
          grep -F "Neo Theater Worldgen 0.4.0" run/logs/latest.log
          test -d run/world_neotheater_v040_smoke/data
          test -d run/world_neotheater_v040_smoke/DIM-1/data
          test -d run/world_neotheater_v040_smoke/DIM1/data
          if grep -E "Failed to load datapacks|Registry loading errors|Exception in server tick loop|Failed to start the minecraft server" run/logs/latest.log; then
            echo "Fatal server/worldgen error found"
            tail -n 300 run/logs/latest.log
            exit 1
          fi
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            echo "runServer exited unexpectedly with code $code"
            tail -n 300 smoke-test.log
            exit "$code"
          fi

      - name: Package sources and hashes
        working-directory: neotheater-v040
        run: |
          zip -qr NeoTheaterWorldgen-0.4.0-sources.zip settings.gradle gradle.properties build.gradle README.md src
          sha256sum build/libs/*.jar > NeoTheaterWorldgen-0.4.0-SHA256.txt

      - name: Upload tested artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoTheaterWorldgen-0.4.0
          if-no-files-found: error
          path: |
            neotheater-v040/build/libs/*.jar
            neotheater-v040/NeoTheaterWorldgen-0.4.0-sources.zip
            neotheater-v040/NeoTheaterWorldgen-0.4.0-SHA256.txt
            neotheater-v040/build.log
            neotheater-v040/smoke-test.log
            neotheater-v040/run/logs/latest.log
