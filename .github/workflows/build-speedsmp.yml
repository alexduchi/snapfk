name: Build SpeedSMP 1.0.3
on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build against official Paper API
        working-directory: speedsmp
        run: |
          rm -rf ~/.m2/repository/it/unimi/dsi/fastutil
          mvn -B -U clean package
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: SpeedSMP-1.0.3
          path: speedsmp/target/SpeedSMP-1.0.3.jar
          if-no-files-found: error
