name: Build HoloForge AR APK

on:
  push:
    branches:
      - agent/holoforge-ar-build
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compile clean diagnostic APK
        run: |
          cd holoforge_v03
          gradle clean :app:assembleDebug --stacktrace

      - name: Verify APK structure and signature
        run: |
          APK=holoforge_v03/app/build/outputs/apk/debug/app-debug.apk
          test -s "$APK"
          $ANDROID_HOME/build-tools/35.0.0/aapt dump badging "$APK"
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose --print-certs "$APK"
          cp "$APK" HoloForgeAR-v0.3-diagnostic.apk
          sha256sum HoloForgeAR-v0.3-diagnostic.apk > HoloForgeAR-v0.3-diagnostic.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HoloForgeAR-v0.3-diagnostic-APK
          path: |
            HoloForgeAR-v0.3-diagnostic.apk
            HoloForgeAR-v0.3-diagnostic.apk.sha256
          if-no-files-found: error
          retention-days: 14
