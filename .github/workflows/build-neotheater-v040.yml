name: Build NeoTheater Worldgen 0.4.0

on:
  push:
    branches: ["neotheater-ci-v040"]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Assemble verified V0.4 source
        run: |
          set -euo pipefail
          mkdir -p neotheater-v040
          base64 -d neotheater-build/project.tar.gz.b64 > /tmp/base.tar.gz
          tar -xzf /tmp/base.tar.gz -C neotheater-v040
          cat neotheater-v030/overlay.part00 neotheater-v030/overlay.part01 neotheater-v030/overlay.part02 neotheater-v030/overlay.part03 | base64 -d > /tmp/v03.tar.gz
          tar -xzf /tmp/v03.tar.gz -C neotheater-v040
          cat neotheater-v040/v04p_00 neotheater-v040/v04p_01 neotheater-v040/v04p_02 | base64 -d | gzip -d > /tmp/v04.patch
          cd neotheater-v040
          patch --batch -p4 < /tmp/v04.patch
          sed -i 's/import net.minecraft.world.level.Heightmap;/import net.minecraft.world.level.levelgen.Heightmap;/' src/main/java/fr/neo/neotheater/world/CapitalGenerator.java
          grep -F 'mod_version=0.4.0' gradle.properties
          grep -F 'version="0.4.0"' src/main/resources/META-INF/neoforge.mods.toml
          grep -F 'persistent inhabitants' src/main/java/fr/neo/neotheater/world/CapitalGenerator.java
          grep -F 'Neo Theater Worldgen 0.4.0' src/main/java/fr/neo/neotheater/NeoTheater.java
      - name: Build
        working-directory: neotheater-v040
        run: gradle --stacktrace build
      - name: Smoke test dedicated server
        working-directory: neotheater-v040
        run: |
          mkdir -p run
          printf 'eula=true\n' > run/eula.txt
          cat > run/server.properties <<'EOF'
          level-name=world_neotheater_v040_smoke
          level-type=neotheater:military
          online-mode=false
          spawn-protection=0
          view-distance=4
          simulation-distance=4
          max-tick-time=180000
          generate-structures=true
          EOF
          set +e
          timeout 180s gradle --stacktrace runServer > smoke-test.log 2>&1
          code=$?
          set -e
          test -f run/logs/latest.log
          grep -F 'Done (' run/logs/latest.log
          grep -F 'Neo Theater active:' run/logs/latest.log
          grep -F 'Neo Theater Worldgen 0.4.0' run/logs/latest.log
          if grep -E 'Failed to load datapacks|Registry loading errors|Exception in server tick loop|Failed to start the minecraft server' run/logs/latest.log; then exit 1; fi
          test "$code" -eq 0 -o "$code" -eq 124
      - name: Verify jar metadata and package
        working-directory: neotheater-v040
        run: |
          JAR=$(find build/libs -name '*.jar' | head -n1)
          unzip -p "$JAR" META-INF/neoforge.mods.toml | grep -F 'version="0.4.0"'
          zip -qr NeoTheaterWorldgen-0.4.0-sources.zip settings.gradle gradle.properties build.gradle README.md src
          sha256sum "$JAR" > NeoTheaterWorldgen-0.4.0-SHA256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: NeoTheaterWorldgen-0.4.0-verified
          path: |
            neotheater-v040/build/libs/*.jar
            neotheater-v040/NeoTheaterWorldgen-0.4.0-sources.zip
            neotheater-v040/NeoTheaterWorldgen-0.4.0-SHA256.txt
            neotheater-v040/run/logs/latest.log
            neotheater-v040/smoke-test.log
