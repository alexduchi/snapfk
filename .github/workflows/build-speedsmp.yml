name: Build SpeedSMP 1.0.3
on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: speedsmp/pom.xml
      - name: Build against official Paper API
        working-directory: speedsmp
        run: |
          mvn -q -B -U clean package > /tmp/build.log 2>&1 || { tail -100 /tmp/build.log; exit 1; }
          tail -20 /tmp/build.log || true
      - name: Inspect jar
        run: |
          jar tf speedsmp/target/SpeedSMP-1.0.3.jar
          test -f speedsmp/target/SpeedSMP-1.0.3.jar
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: SpeedSMP-1.0.3
          path: speedsmp/target/SpeedSMP-1.0.3.jar
          if-no-files-found: error
